<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>

<title>Studex 0.10</title>
<!--
STUDEX SPIRIT
1. Quiet over loud.
2. Structure over spectacle.
3. Light panels over heavy modals.
4. Consistent rules over one-off exceptions.
5. Motion should support orientation, not call attention to itself.
6. Density should feel calm, precise, and readable.
-->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  /* Numeric rule: even sizes by default, 5-step spacing for macro rhythm, 1px hairlines as the main exception. */

  --fs-body:12px;
  --fs-lg:16px;
  --fs-xl:20px;
  --fs-2xl:24px;
  --sp-1:4px;
  --sp-2:8px;
  --sp-3:12px;
  --sp-4:16px;
  --sp-5:20px;
  --sp-6:24px;
  --sp-7:50px;
  --tabbar-h:50px;

  --rail-w:240px;
  --rail-w-compact:140px;
  --content-inline-pad:24px;
  --content-inline-pad-tight:16px;
  --floating-panel-max-w:360px;
  --floating-panel-edge-gap:16px;
  --floating-panel-anchor-gap:12px;
  --sb-right-inline-pad:var(--sp-3);
  --sb-right-body-pad:var(--sp-3);
  --control-h:30px;
  --control-h-md:34px;
  --control-h-lg:36px;
  --icon-btn-size:30px;
  --icon-btn-size-lg:34px;
  --sidebar-add-size:20px;
  --sidebar-add-size-lg:24px;
  --panel-pad:var(--sp-3);
  --panel-pad-lg:var(--sp-6);
  --floating-panel-mobile-inline:calc(var(--sp-4) * 2);
  --home-max-w:560px;
  --home-pad-top:var(--sp-7);
  --home-pad-bottom:var(--sp-5);
  --home-date-size:var(--fs-xl);
  --home-date-gap:var(--sp-7);
  --panel-rise-y:10px;
  --panel-drop-y:18px;
  --dur-rise:.22s;
  --control-h-xl:38px;
  --picker-item-h:32px;
  --rel-item-pad-y:6px;
  --tab-bg:rgba(127,127,127,.08);
  --tab-bg-hover:rgba(127,127,127,.14);
  --floating-panel-top:72px;
  --na-panel-top:120px;
  --na-panel-top-mobile:96px;
  --ease-smooth:cubic-bezier(.2,.7,.2,1);
  --dur-fast:.1s;
  --dur-soft:.18s;
  --dur-panel:.24s;
  --dur-layout:.28s;
  --tr-layout-grid:grid-template-columns var(--dur-layout) var(--ease-smooth),grid-template-rows var(--dur-layout) var(--ease-smooth);
  --tr-panel-size:width var(--dur-panel) var(--ease-smooth),max-height var(--dur-panel) var(--ease-smooth);
  --tr-panel-transform:transform var(--dur-panel) var(--ease-smooth);
  --tr-rail-inline:width var(--dur-panel) var(--ease-smooth),padding var(--dur-panel) var(--ease-smooth);

  --shadow-panel:0 16px 40px rgba(0,0,0,.10);
  --shadow-panel-strong:0 20px 44px rgba(0,0,0,.12);
  --shadow-soft:0 8px 20px rgba(0,0,0,.08);
  font-family:var(--font-ui);
  font-size:var(--fs-sm);
}
body{overflow:hidden;background:var(--bg)}
body[data-theme="dark"]{
  --ink:#f3f3ef;
  --ink2:#d2d2cc;
  --ink3:#a0a098;
  --ink4:#6f6f68;
  --bg:#181816;
  --bg2:#20201d;
  --bg3:#2a2a26;
  --bd:#34342f;
  --bd2:#4a4a44;
  --solid:#f3f3ef;
  --solid-ink:#181816;
}
.app{display:flex;flex-direction:column;height:100vh;background:var(--bg);color:var(--ink)}
body.theme-anim,

  transition:background-color .18s ease,color .18s ease,border-color .18s ease,fill .18s ease,stroke .18s ease,box-shadow .18s ease;
}
.row{
  flex:1;
  display:grid;
  grid-template-columns:auto minmax(0,1fr) auto;
  grid-template-rows:minmax(0,1fr);
  overflow:hidden;
  min-width:0;
  transition:var(--tr-layout-grid);
}

/* ── SHARED: text input ── */
.na-i{
  height:var(--control-h);padding:0 var(--sp-2);
  background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);
  font-size:var(--fs-sm);color:var(--ink);outline:none;font-family:inherit;width:100%;
}
.na-i:focus{border-color:var(--bd2)}

/* ── SHARED: uppercase label ── */
.sb-lbl,.cm-rl,.na-l,.home-sec-lbl{
  font-size:var(--fs-xs);font-weight:500;color:var(--ink4);
  text-transform:uppercase;letter-spacing:.08em;
}

/* ── SIDEBAR ── */
.sb{
  grid-column:1;
  grid-row:1;
  flex-shrink:0;
  background:var(--bg2);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  width:var(--rail-w);
  transition:var(--tr-panel-size),var(--tr-border-soft),var(--tr-fade-soft);
}
.sb.collapsed{width:0}
.sb-right{
  grid-column:3;
  grid-row:1;
  border-left:none;
  transition:var(--tr-panel-size),var(--tr-border-soft),var(--tr-panel-transform),var(--tr-fade-soft);
}
.sb-right.collapsed{border-left-color:transparent}
.sb-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 var(--sp-3)}
.cmd-bar,.srch-bar{display:flex;align-items:center;padding:var(--sp-3) var(--sp-3) var(--sp-6)}
.cmd-bar input,.srch-bar input{flex:1;height:var(--control-h);padding:0 var(--sp-2);background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);font-size:var(--fs-sm);color:var(--ink);outline:none;font-family:inherit;width:100%}
.cmd-bar input:focus,.srch-bar input:focus{border-color:var(--bd2)}
.cmd-bar input::placeholder,.srch-bar input::placeholder{color:var(--ink4)}
.sb-icon{width:var(--icon-btn-size);height:var(--icon-btn-size);border:none;border-radius:var(--r);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink2);transition:background var(--dur-fast),color var(--dur-fast);padding:0}
.sb-icon svg{
  width:16px;
  height:16px;
  display:block;
  stroke-width:1.25;
}
.sb-icon.nav-btn svg{width:22px;height:22px}
.sb-icon:hover{background:var(--bg3);color:var(--ink2)}
.sb-icon.on{background:var(--bg3);color:var(--ink)}
#btn-save.on{background:transparent;color:var(--ink)}
#btn-save.on:hover{background:transparent;color:var(--ink)}
#tabbar-left .sb-icon:not(:disabled):not(.nav-btn),

#tabbar-left .sb-icon:not(:disabled):not(.nav-btn):hover,
#tabbar-right .sb-icon:not(:disabled):not(#btn-save):hover{color:var(--ink2)}
#tabbar-left .sb-icon.on:not(:disabled):not(.nav-btn),
#tabbar-right .sb-icon.on:not(:disabled):not(#btn-save){background:transparent;color:var(--ink2)}
#tabbar-left .sb-icon.on:not(:disabled):not(.nav-btn):hover,
#tabbar-right .sb-icon.on:not(:disabled):not(#btn-save):hover{background:var(--bg3);color:var(--ink2)}
.sb-sec{padding:2px 0}
.sb-sec + .sb-sec{margin-top:var(--sp-3)}
.sb-lbl{padding:0 var(--sp-3);margin-bottom:var(--sp-2)}
.sb-lbl-row{display:flex;align-items:center;justify-content:space-between;padding:0 var(--sp-3);margin-bottom:var(--sp-2)}
.sb-lbl-row .sb-lbl{padding:0;margin:0}
.sb-add-btn{width:var(--sidebar-add-size);height:var(--sidebar-add-size);border:none;border-radius:var(--r);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink3);padding:0;transition:background var(--dur-fast),color var(--dur-fast)}
.sb-add-btn:hover{background:var(--bg3);color:var(--ink2)}
.sb-add-btn svg{width:12px;height:12px;display:block}
.disc-row,.subd-row,.write-row{cursor:pointer;display:flex;align-items:center;border-radius:var(--r);margin:0 var(--sp-2);user-select:none;transition:background var(--dur-fast),color var(--dur-fast),box-shadow var(--dur-fast);font-size:var(--fs-sm);color:var(--ink3)}
.disc-row{height:var(--control-h);padding:0 0 0 var(--sp-2);gap:var(--sp-2)}
.subd-row{min-height:28px;padding:0 var(--sp-2) 0 calc(var(--sp-5) + var(--sp-2));background:color-mix(in srgb,var(--bg) 82%,transparent);box-shadow:inset 0 0 0 1px transparent}
.write-row{height:var(--control-h);padding:0 0 0 var(--sp-2);gap:var(--sp-2);font-weight:500;color:var(--ink2)}
.disc-row + .disc-row,
.disc-row + .col,
.col + .disc-row,
.subd-row + .subd-row,
.write-row + .write-row{margin-top:1px}
.col{overflow:hidden;transition:max-height var(--dur-soft) ease;padding-top:1px}
.col.open + .disc-row{margin-top:var(--sp-2)}
.disc-row:hover,.disc-row.on,.write-row:hover,.write-row.active{background:var(--bg3)}
.subd-row:hover,.subd-row.active{background:var(--bg3);box-shadow:inset 0 0 0 1px var(--bd)}
.chev-slot{width:var(--icon-btn-size);height:var(--icon-btn-size);flex-shrink:0;margin-left:auto}
.chev{font-size:16px;color:var(--ink3);width:var(--icon-btn-size);height:var(--icon-btn-size);flex-shrink:0;transition:transform var(--dur-fast);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;margin-left:auto}
.chev.open{transform:rotate(90deg)}
.disc-lbl{font-size:var(--fs-sm);font-weight:500;color:var(--ink2);flex:1;cursor:pointer;line-height:1.2}
.disc-row.on .disc-lbl{color:var(--ink)}
.subd-row .disc-lbl{font-weight:500;color:var(--ink2)}
.col.shut{max-height:0;padding-top:0}
.col.open{max-height:900px}
.subd-row.active,.write-row.active{font-weight:500;color:var(--ink2)}
.subd-row.active .disc-lbl{color:var(--ink)}

/* ── TABBAR ── */
.main{grid-column:2;grid-row:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;position:relative}
.main-views{flex:1;display:flex;min-width:0;overflow:hidden}
.main-pane{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.region{display:none;flex:1;flex-direction:column;overflow:hidden}
.region.on{display:flex}
.tabbar{display:flex;height:var(--tabbar-h);flex-shrink:0;background:var(--bg2);align-items:center;padding:0;gap:0}
#tabbar-left{display:grid;grid-template-columns:repeat(4,minmax(30px,1fr));align-items:center;justify-items:center;width:var(--rail-w);flex-shrink:0;overflow:hidden;padding:0 var(--sp-3);transition:var(--tr-rail-inline)}
#tabbar-right{display:grid;grid-template-columns:repeat(4,minmax(30px,1fr));align-items:center;justify-items:center;width:var(--rail-w);flex-shrink:0;overflow:hidden;padding:0 var(--sp-3);transition:var(--tr-rail-inline)}

/* top-bar button system */
.topbar-btn{
  width:var(--icon-btn-size);
  height:var(--icon-btn-size);
  display:flex;
  align-items:center;
  justify-content:center;
}
.topbar-btn svg{
  width:20px;
  height:20px;
  display:block;
}
#btn-sb-right-toggle svg{transition:var(--tr-rotate-soft)}
.topbar-btn:disabled,
.sb-icon:disabled{
  cursor:default;
  background:transparent;
  color:var(--ink4);
  pointer-events:none;
}
.topbar-btn:disabled:hover,
.sb-icon:disabled:hover{
  background:transparent;
  color:var(--ink4);
}
.topbar-btn:disabled svg,
.sb-icon:disabled svg{
  opacity:1;
}
.tab-list{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(0,1fr);align-items:center;column-gap:var(--sp-1);overflow-x:auto;min-width:0;padding:var(--sp-1);flex:1 1 auto;height:calc(var(--tabbar-h) - (var(--tabbar-inset-y) * 2));margin:var(--tabbar-inset-y) var(--sp-1);background:var(--bg2);border-radius:var(--r-pill);box-shadow:inset 0 0 0 1px var(--bd)}
.tab-list::-webkit-scrollbar{display:none}
.tab{height:100%;padding:0 calc(var(--sp-4) + 10px);font-size:var(--fs-xs);color:var(--ink3);cursor:pointer;display:flex;align-items:center;justify-content:center;white-space:nowrap;overflow:hidden;min-width:0;transition:color var(--dur-fast),background var(--dur-fast),box-shadow var(--dur-fast),border-color var(--dur-fast);user-select:none;position:relative;margin:0;border-radius:var(--r-pill);background:var(--tab-bg);box-shadow:inset 0 0 0 1px transparent}
.tab:not(.on){background:var(--tab-bg)}
.tab.on{background:var(--bg);color:var(--ink);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.06), inset 0 0 0 1px var(--bd)}
.tab.on:hover{background:var(--bg);color:var(--ink)}
.tab:hover{background:var(--tab-bg-hover);color:var(--ink2)}
.tab-lbl{overflow:hidden;text-overflow:ellipsis;min-width:0;text-align:center}
.tab-close{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:var(--r);color:var(--ink2);transition:background var(--dur-fast),color var(--dur-fast),opacity var(--dur-fast);position:absolute;right:var(--sp-2);top:50%;transform:translateY(-50%);opacity:0;pointer-events:none}
.tab:hover .tab-close{opacity:1;pointer-events:auto}
.tab-close:hover{background:var(--bg);color:var(--ink2)}
.tab:not(.on) .tab-close:hover{background:var(--bg2);color:var(--ink)}
.tab-close svg{width:20px;height:20px;display:block}

/* ── PAGE HEADER ── */
.bc{font-size:var(--fs-sm);color:var(--ink3);flex:1;min-width:0;display:flex;align-items:center;gap:var(--sp-1);overflow:hidden}
.bc span{white-space:nowrap}
.bc-sep{color:var(--ink4)}
.bc-anc{color:var(--ink3);transition:color var(--dur-fast);cursor:pointer}
.bc-anc:hover{color:var(--ink2)}
.title-row{display:flex;align-items:flex-start;gap:var(--sp-2)}
.title-row .v-title{flex:1}
.art-header{display:flex;align-items:center;gap:var(--sp-1);margin-bottom:var(--sp-3)}
/* ── CONTENT AREA ── */
.ct{flex:1;overflow:auto}
.vw{display:none}
.vw.on{display:block;padding:var(--sp-5) var(--content-inline-pad)}
.empty-msg{font-size:var(--fs-sm);font-weight:500;letter-spacing:.02em;line-height:1.6;color:var(--ink4)}
.vw.is-empty,
.cg.is-empty,
.g-wrap.is-empty,
.home-page-grid.is-empty{position:relative;min-height:clamp(240px,45vh,420px)}
.vw.is-empty>.empty-msg,
.cg.is-empty>.empty-msg,
.g-wrap.is-empty>.empty-msg,
.home-page-grid.is-empty>.empty-msg{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.cg.is-empty>.empty-msg,
.home-page-grid.is-empty>.empty-msg{grid-column:1/-1}

/* ── HOME ── */
.home-body{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.home-inner{width:100%;max-width:var(--home-max-w);padding:var(--home-pad-top) var(--content-inline-pad) var(--home-pad-bottom);flex-shrink:0;margin:0 auto}
.home-date{font-size:var(--home-date-size);font-weight:500;color:var(--ink2);margin-bottom:var(--home-date-gap);text-align:center;line-height:1.5}
.home-sec{margin-bottom:var(--sp-7);width:100%}
.home-sec-lbl{margin-bottom:var(--sp-2)}
.home-page-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:var(--sp-2)}
.home-page-tile{padding:var(--sp-3);border:1px solid var(--bd);border-radius:var(--r-3);background:var(--bg);cursor:pointer;transition:border-color var(--dur-fast);display:flex;flex-direction:column;justify-content:center;overflow:hidden}
.home-page-tile:hover{border-color:var(--bd2)}
.home-page-title{font-size:var(--fs-sm);font-weight:500;color:var(--ink);line-height:20px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.home-page-meta{font-size:var(--fs-xs);color:var(--ink4);margin-bottom:var(--sp-1);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

/* ── GRAPH VIEW ── */
.g-wrap{display:flex;flex-direction:column;gap:var(--sp-6)}
.b-block{display:flex;flex-direction:column;gap:var(--sp-2)}
.b-head{display:flex;align-items:center;gap:var(--sp-2)}
.b-node{font-size:var(--fs-sm);font-weight:600;color:var(--ink2);cursor:pointer;user-select:none;transition:color var(--dur-fast);white-space:nowrap;letter-spacing:.01em}
.b-node:hover{color:var(--ink)}
.b-line{flex:1;height:1px;background:var(--bd)}
.a-wrap{padding:var(--sp-2) 0 0 var(--sp-4)}
.a-row{display:flex;flex-wrap:wrap;gap:var(--sp-1) var(--sp-2);align-items:baseline}
.a-node{height:24px;padding:0 var(--sp-2);border-radius:var(--r-2);background:var(--bg3);font-size:var(--fs-sm);font-weight:500;color:var(--ink2);cursor:pointer;white-space:nowrap;user-select:none;display:flex;align-items:center;transition:background var(--dur-fast),color var(--dur-fast)}
.a-node:hover{background:var(--bd);color:var(--ink)}
.a-node.dashed{background:transparent;color:var(--ink3);border:1px dashed var(--bd)}
.a-node.dashed:hover{background:var(--bg2);color:var(--ink2);border-color:var(--bd2)}
.sub-node{height:18px;padding:0 var(--sp-1);border-radius:var(--r-2);font-size:var(--fs-xs);color:var(--ink4);cursor:pointer;white-space:nowrap;user-select:none;display:flex;align-items:center;transition:color var(--dur-fast);border-left:2px solid var(--bd)}
.sub-node:hover{color:var(--ink3);border-color:var(--bd2)}

/* ── LIST VIEW ── */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:var(--sp-2)}
.page-tile{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r-3);padding:var(--sp-3);cursor:pointer;transition:border-color var(--dur-fast)}
.page-tile:hover{border-color:var(--bd2)}
.page-meta{font-size:var(--fs-xs);font-weight:500;color:var(--ink4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:var(--sp-1)}
.page-sub{font-size:var(--fs-xs);color:var(--ink3);line-height:18px;margin-top:var(--sp-1)}
.page-title{font-size:var(--fs-base);font-weight:600;line-height:24px;color:var(--ink)}
.page-def{font-size:var(--fs-sm);color:var(--ink2);margin-top:var(--sp-2);line-height:20px;border-top:1px solid var(--bd);padding-top:var(--sp-2);display:-webkit-box;line-clamp:3;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

/* ── PAGE VIEW ── */
.page{display:none;flex:1;overflow-y:auto;flex-direction:row;position:relative}
.page.on{display:flex}
.page-body{padding:var(--sp-5) var(--content-inline-pad) var(--sp-7);flex:1 1 0;min-width:0}

.cm-v{width:100%;outline:none;border-radius:var(--r);padding:0;border:1px solid transparent;font-family:inherit;background:transparent;display:block;line-height:inherit}
.cm-v[contenteditable="false"]{cursor:default;pointer-events:none}
.cm-v[contenteditable="true"]{cursor:text}
.cm-v[contenteditable="true"]:hover{background:transparent}
.cm-v[contenteditable="true"]:focus{background:transparent;border-color:transparent}
.md-inline-token{display:inline}
.cm-v[contenteditable="true"] .md-inline-token.inline-italic,
.ed-block.editing .md-inline-token.inline-italic{font-style:italic}
.cm-v[contenteditable="true"] .md-inline-token.inline-bold,
.ed-block.editing .md-inline-token.inline-bold{font-weight:600;color:var(--ink)}
.cm-v[contenteditable="true"] .md-inline-token.inline-code,
.ed-block.editing .md-inline-token.inline-code{font-family:monospace;background:var(--bg3);padding:0 var(--sp-1);border-radius:var(--r-2);font-size:.92em}
.cm-v[contenteditable="true"].inline-italic,
.ed-block.editing.inline-italic{font-style:italic}
.cm-v[contenteditable="true"].inline-bold,
.ed-block.editing.inline-bold{font-weight:600;color:var(--ink)}
.v-title{font-size:var(--fs-2xl);font-weight:700;line-height:1.2;color:var(--ink);margin-bottom:var(--sp-1)}

function replaceObjectContents(target,source={}){
  Object.keys(target).forEach(key=>delete target[key]);
  Object.assign(target,source||{});
}
function replaceArrayContents(target,source=[]){
  target.splice(0,target.length,...(Array.isArray(source)?source:[]));
}
function ensureParentChildLinks(){
  Object.keys(DB).forEach(id=>{
    const entry=DB[id];
    if(!entry)return;
    if(!Array.isArray(entry.children))entry.children=[];
  });
  Object.keys(DB).forEach(id=>{
    const p=DB[id]?.parent;
    if(p&&DB[p]&&!DB[p].children.includes(id)){
      DB[p].children.push(id);
    }
  });
  Object.keys(DB).forEach(parentId=>{
    const parent=DB[parentId];
    if(!parent?.children?.length)return;
    const uniqueChildren=parent.children.filter((childId,idx,list)=>list.indexOf(childId)===idx&&DB[childId]);
    parent.children=uniqueChildren
      .map((childId,currentIndex)=>({childId,currentIndex,initial:INITIAL_PARENT_INDEX[childId]}))
      .sort((a,b)=>{
        const aPinned=a.initial?.parent===parentId&&Number.isInteger(a.initial?.index);
        const bPinned=b.initial?.parent===parentId&&Number.isInteger(b.initial?.index);
        if(aPinned&&bPinned)return a.initial.index-b.initial.index;
        if(aPinned)return -1;
        if(bPinned)return 1;
        return a.currentIndex-b.currentIndex;
      })
      .map(item=>item.childId);
  });
}
function rebuildDiscMapFromDB(){
  const currentOrder=Object.keys(DISC);
  const disciplineIds=Object.keys(DB).filter(id=>DB[id]?.level==='Discipline');
  const orderedIds=[
    ...currentOrder.filter(id=>disciplineIds.includes(id)),
    ...disciplineIds
      .filter(id=>!currentOrder.includes(id))
      .sort((a,b)=>DB[a].label.localeCompare(DB[b].label))
  ];
  const next={};
  orderedIds.forEach(id=>{
    const childIds=(DB[id]?.children||[]).filter(childId=>DB[childId]?.level==='Sub-discipline');
    next[id]=childIds.map(childId=>DB[childId].label);
  });
  replaceObjectContents(DISC,next);
}
function isTestArtifactEntry(id='',entry=null){
  const label=(entry?.label||'').trim();
  return id.startsWith('smoke_test_page_')
    || id.startsWith('soft_break_smoke_')
    || id.startsWith('probe_')
    || label.startsWith('Smoke Test Page')
    || label.startsWith('Soft Break Smoke')
    || TEST_ARTIFACT_LABELS.includes(label);
}
function pruneTestArtifactsFromMap(map){
  if(!map||typeof map!=='object')return [];
  const removedIds=Object.keys(map).filter(id=>isTestArtifactEntry(id,map[id]));
  if(!removedIds.length)return [];
  removedIds.forEach(id=>delete map[id]);
  Object.values(map).forEach(entry=>{
    if(!entry||typeof entry!=='object')return;
    if(Array.isArray(entry.children))entry.children=entry.children.filter(childId=>map[childId]);
    if(entry.parent&&!map[entry.parent])delete entry.parent;
  });
  return removedIds;
}
function pruneTestArtifactsFromState(state){
  if(!state||typeof state!=='object')return [];
  const removedIds=pruneTestArtifactsFromMap(state.db);
  if(!removedIds.length)return [];
  if(Array.isArray(state.dirtyIds))state.dirtyIds=state.dirtyIds.filter(id=>!removedIds.includes(id));
  if(state.disc&&typeof state.disc==='object'){
    Object.keys(state.disc).forEach(key=>{
      if(Array.isArray(state.disc[key]))state.disc[key]=state.disc[key].filter(label=>!TEST_ARTIFACT_LABELS.includes(label)&&!label.startsWith('Soft Break Smoke'));
    });
  }
  return removedIds;
}
function readJsonStorage(keys,fallbackValue,issueLabel='storage load'){
  try{
    const keyList=Array.isArray(keys)?keys:[keys];
    for(const key of keyList){
      const raw=localStorage.getItem(key);
      if(raw)return JSON.parse(raw);
    }
    return fallbackValue;
  }catch(err){
    logNonCriticalIssue(`[Studex] ${issueLabel} failed:`,err?.message||err);
    return fallbackValue;
  }
}
function writeJsonStorage(key,value,issueLabel='storage save'){
  try{
    localStorage.setItem(key,JSON.stringify(value));
    return true;
  }catch(err){
    logNonCriticalIssue(`[Studex] ${issueLabel} failed:`,err?.message||err);
    return false;
  }
}
function readCacheState(){
  const next=readJsonStorage([CACHE_DB_STATE_KEY,LEGACY_LOCAL_DB_STATE_KEY],null,'cache load');
  pruneTestArtifactsFromState(next);
  return next;
}
function persistCacheState(){
  const dirtyIds=[...new Set([
    ...[...DIRTY_IDS].filter(id=>DB[id]),
    ...Object.keys(INLINE_DIRTY).filter(id=>DB[id])
  ])];
  const saved=writeJsonStorage(CACHE_DB_STATE_KEY,{db:DB,disc:DISC,writings:WRITINGS,dirtyIds},'cache save');
  if(saved)localStorage.removeItem(LEGACY_LOCAL_DB_STATE_KEY);
  return saved;
}
function hydrateCachedState(){
  const next=readCacheState();
  if(!next?.db||typeof next.db!=='object')return false;
  replaceObjectContents(DB,next.db);
  if(next.disc&&typeof next.disc==='object')replaceObjectContents(DISC,next.disc);
  if(Array.isArray(next.writings)&&next.writings.length)replaceArrayContents(WRITINGS,next.writings);
  ensureParentChildLinks();
  return true;
}
function mergeCachedDirtyEntries(state){
  if(!Array.isArray(state?.dirtyIds)||!state?.db||typeof state.db!=='object')return [];
  const dirtyIds=state.dirtyIds.filter(id=>state.db[id]);
  dirtyIds.forEach(id=>{
    DB[id]=JSON.parse(JSON.stringify(state.db[id]));
  });
  return dirtyIds;
}
function readTrashState(){
  const next=readJsonStorage(TRASH_STATE_KEY,[],'trash load');
  return Array.isArray(next)?next.filter(item=>!isTestArtifactEntry(item?.id||'',item?.entry||null)):[];
}
function persistTrashState(items){
  return writeJsonStorage(TRASH_STATE_KEY,items,'trash save');
}
function getParentChildIndex(id,entry=DB[id]){
  const parentId=entry?.parent;
  const siblings=parentId&&DB[parentId]?.children;
  return Array.isArray(siblings)?siblings.indexOf(id):-1;
}
function getRestoreParentIndex(id,entry,parentIndex=-1){
  if(Number.isInteger(parentIndex)&&parentIndex>=0)return parentIndex;
  const initial=INITIAL_PARENT_INDEX[id];
  if(initial&&initial.parent===entry?.parent&&Number.isInteger(initial.index)&&initial.index>=0){
    return initial.index;
  }
  return -1;
}
function pushTrashEntry(id,entry,parentIndex=-1){
  const next=readTrashState().filter(item=>item?.id!==id);
  next.unshift({
    id,
    entry:JSON.parse(JSON.stringify(entry)),
    parentIndex:Number.isInteger(parentIndex)?parentIndex:-1,
    removedAt:new Date().toISOString()
  });
  persistTrashState(next.slice(0,50));
}
function requeueTrashEntry(item){
  if(!item)return;
  const next=readTrashState().filter(entry=>entry?.id!==item.id);
  next.unshift(item);
  persistTrashState(next.slice(0,50));
}
function removeTrashEntry(id){
  const next=readTrashState();
  const idx=next.findIndex(item=>item?.id===id);
  if(idx<0)return null;
  const [item]=next.splice(idx,1);
  persistTrashState(next);
  return item||null;
}

function renderNodeList(host,ids,renderNode,emptyText=''){
  if(!host)return;
  host.innerHTML='';
  setEmptyState(host,false);
  if(ids.length){
    ids.forEach(id=>{
      const node=renderNode(id);
      if(node)host.appendChild(node);
    });
    setEmptyState(host,!host.children.length);
    return;
  }
  if(emptyText){
    appendMessage(host,emptyText);
    setEmptyState(host,true);
  }
}

function renderSelectableList(host,items,{
  emptyClass='empty-msg',
  emptyText='',
  isActive=()=>false,
  getLabel=item=>item?.label||'',
  getKind=()=> '',
  onSelect=()=>{}
}={}){
  if(!host)return;
  host.innerHTML='';
  if(!items.length){
    if(emptyText)appendMessage(host,emptyText,emptyClass);
    return;
  }
  items.forEach((item,idx)=>{
    const row=el('div','pk-item'+(isActive(item,idx)?' on':''));
    const label=el('div','pk-item-label');
    label.textContent=getLabel(item,idx);
    row.appendChild(label);
    const kindText=getKind(item,idx);
    if(kindText){
      const kind=el('div','pk-item-kind');
      kind.textContent=kindText;
      row.appendChild(kind);
    }
    row.onclick=()=>onSelect(item,idx);
    host.appendChild(row);
  });
}
function isPortraitLayout(){
  return !!PORTRAIT_QUERY?.matches;

function syncPanelLayoutTransition(){
  const portraitNow=isPortraitLayout();
  if(portraitNow===wasPortraitLayout)return;
  wasPortraitLayout=portraitNow;
  const panel=$('sb-right');
  if(!panel)return;
  panel.classList.remove('layout-enter-portrait');
  APP?.classList.remove('layout-snap-wide');
  clearTimeout(panelLayoutTimer);
  if(!portraitNow){
    APP?.classList.add('layout-snap-wide');
    panelLayoutTimer=setTimeout(()=>{
      APP?.classList.remove('layout-snap-wide');

function parseInlineSegments(text=''){
  const segments=[];
  let i=0;
  let plain='';
  const pushPlain=()=>{
    if(!plain)return;
    segments.push({type:'text',raw:plain,text:plain});
    plain='';
  };
  while(i<text.length){
    if(text.startsWith('**',i)){
      const end=text.indexOf('**',i+2);
      if(end>i+2){
        pushPlain();
        const raw=text.slice(i,end+2);
        segments.push({type:'bold',raw,text:text.slice(i+2,end)});
        i=end+2;
        continue;
      }
    }
    if(text[i]==='*'){
      const end=text.indexOf('*',i+1);
      if(end>i+1){
        pushPlain();
        const raw=text.slice(i,end+1);
        segments.push({type:'italic',raw,text:text.slice(i+1,end)});
        i=end+1;
        continue;
      }
    }
    if(text[i]==='`'){
      const end=text.indexOf('`',i+1);
      if(end>i+1){
        pushPlain();
        const raw=text.slice(i,end+1);
        segments.push({type:'code',raw,text:text.slice(i+1,end)});
        i=end+1;
        continue;
      }
    }
    plain+=text[i];
    i+=1;
  }
  pushPlain();
  return segments;
}

function serializeEditableContent(root){

  if(root.nodeType===Node.ELEMENT_NODE&&root.dataset?.inlineRaw)return root.dataset.inlineRaw;

  root.childNodes.forEach(child=>{out+=serializeEditableContent(child);});

}

    const displayLen=segment.text.length;
    if(rawOffset>=rawCursor+rawLen){
      rawCursor+=rawLen;
      displayCursor+=displayLen;
      continue;
    }
    const innerOffset=Math.max(0,rawOffset-rawCursor);

function setEditableCaretByDisplayOffset(node,offset=0){
  if(!node)return;

  const range=document.createRange();

  const placeInText=(child,len)=>{
    range.setStart(child,Math.min(remaining,len));
    range.collapse(true);
    return true;
  };
  const walk=parent=>{
    const children=parent.childNodes||[];
    for(const child of children){
      if(child.nodeType===Node.TEXT_NODE){
        const len=(child.textContent||'').length;
        if(remaining<=len)return placeInText(child,len);
        remaining-=len;
        continue;
      }
      if(child.nodeType===Node.ELEMENT_NODE&&child.tagName==='BR'){
        if(remaining<=1){
          range.setStartAfter(child);
          range.collapse(true);
          return true;
        }
        remaining-=1;
        continue;
      }
      if(child.nodeType===Node.ELEMENT_NODE&&child.dataset?.inlineRaw){
        const len=(child.textContent||'').length;

          range.collapse(true);

        }
        if(remaining<=len){

          range.collapse(true);
          return true;
        }
        remaining-=len;

  const nextContent=hasTokens?buildInlineEditingFragment(nextRaw):document.createDocumentFragment();

function commandTargetForId(id){
  const entry=DB[id];
  if(!entry)return null;
  if(entry.level==='Discipline' || entry.level==='Section'){
    return {type:'disc',cf:id,label:entry.label};
  }
  return {type:'page-item',id};
}
function resolveCommandTarget(raw){
  const q=(raw||'').trim();
  if(!q)return null;
  const cmd=q.replace(/^\/+/,'').trim();
  const goMatch=cmd.match(/^go\s+(.+)$/i);
  if(goMatch){
    const dest=goMatch[1].trim();
    if(dest.toLowerCase()==='home')return {type:'page',page:'home'};
    return resolveCommandTarget(dest);
  }
  const lo=cmd.toLowerCase();
  if(lo==='home')return {type:'page',page:'home'};
  const exact=Object.keys(DB).find(id=>id===lo||DB[id].label.toLowerCase()===lo);
  const partial=exact||Object.keys(DB).find(id=>DB[id].label.toLowerCase().includes(lo));
  if(partial)return commandTargetForId(partial);
  return null;
}
function shouldShowCommandExamples(raw=''){

}
function syncCommandExamples(raw=''){

    return;
  }
  if(!(pickerMode==='commands'&&isLayerOpen('pkbg'))){

function searchPageTargets(raw=''){
  const q=(raw||'').trim().toLowerCase();
  if(!q)return [];
  const results=[{type:'page',page:'home',label:'Home',kind:'Page'}];
  Object.keys(DB).forEach(id=>{
    const d=DB[id];
    const label=(d.label||'').toLowerCase();
    const alias=(d.alias||'').toLowerCase();
    const orig=(d.orig||'').toLowerCase();
    if(label.includes(q) || alias.includes(q) || orig.includes(q) || id.includes(q)){
      results.push({type:isNavContainerLevel(d.level)?'disc':'page-item',id,cf:d.level==='Discipline'?id:(d.level==='Writing Category'?d.cat:id),label:d.label,kind:displayLevelLabel(d.level)});
    }
  });
  const score=t=>{
    const label=t.label.toLowerCase();
    if(label===q)return 0;
    if(label.startsWith(q))return 1;
    return 2;
  };
  return results
    .filter((t,idx,self)=>idx===self.findIndex(s=>s.type===t.type&&s.id===t.id&&s.page===t.page))
    .sort((a,b)=>score(a)-score(b)||a.label.localeCompare(b.label))
    .slice(0,5);
}
function searchPickerTargets(mode,raw=''){
  const q=(raw||'').trim().toLowerCase();
  if(mode==='commands'){
    return COMMAND_LIST
      .filter(item=>!q || item.label.toLowerCase().includes(q) || item.kind.toLowerCase().includes(q) || (item.searchText||'').toLowerCase().includes(q))
      .slice(0,8)
      .map(item=>({type:'command',label:item.label,kind:item.kind,value:item.value.replace(' <term>',' ')}));
  }
  if(mode==='trash'){
    return readTrashState()
      .filter(item=>{
        const label=(item?.entry?.label||'').toLowerCase();
        const level=(item?.entry?.level||'').toLowerCase();
        const cat=(item?.entry?.cat||'').toLowerCase();
        return !q || label.includes(q) || level.includes(q) || cat.includes(q) || (item?.id||'').toLowerCase().includes(q);
      })
      .slice(0,12)
      .map(item=>({
        type:'trash-item',
        id:item.id,
        label:item.entry?.label||item.id,
        kind:displayLevelLabel(item.entry?.level||'Page')
      }));
  }
  return searchPageTargets(raw);
}
function openTarget(target){

  if(target.type==='page'){showPage(target.page);return true;}
  if(target.type==='disc'){
    const nextCf=target.cf||target.id||cf;
    const nextLabel=target.label||paneLabelForCf(nextCf);
    _goDisc(nextCf,nextLabel);
    return true;
  }
  if(target.type==='page-item'){openPageItem(target.id);return true;}
  return false;
}
function positionPagePicker(){

  const anchor=$(pickerAnchorId);
  if(!panel)return;
  if(isPortraitLayout())return;
  if(!anchor)return;
  resetFloatingPanelPosition(panel);
  const rect=anchor.getBoundingClientRect();
  const panelWidth=Math.min(FLOATING_PANEL_MAX_WIDTH,Math.max(160,window.innerWidth-(FLOATING_PANEL_EDGE_GAP*2)));
  const anchorCenter=rect.left+(rect.width/2);
  const left=Math.max(FLOATING_PANEL_EDGE_GAP,Math.min(window.innerWidth-panelWidth-FLOATING_PANEL_EDGE_GAP,anchorCenter-(panelWidth/2)));
  panel.style.width=panelWidth+'px';

function renderPagePickerList(){
  const list=$('pklist');
  if(!list)return;
  const query=$('pki')?.value.trim()||'';
  const emptyText=pickerMode==='commands'
    ? (query ? 'No matching commands.' : 'Available commands.')
    : pickerMode==='trash'
      ? (query ? 'No matching trashed pages.' : 'Trash is empty.')
      : (query ? 'No matching pages.' : 'Type to search pages.');
  renderSelectableList(list,pickerResults,{
    emptyClass:'pk-empty',
    emptyText,
    isActive:(_,idx)=>idx===pickerActiveIdx,
    getKind:item=>item.kind,
    onSelect:(_,idx)=>selectPagePicker(idx)
  });

function updatePagePicker(raw=''){
  pickerResults=searchPickerTargets(pickerMode,raw);
  if(!pickerResults.length)pickerActiveIdx=-1;
  else if(pickerActiveIdx>=0)pickerActiveIdx=Math.min(pickerActiveIdx,pickerResults.length-1);
  renderPagePickerList();
}
function selectPagePicker(idx=pickerActiveIdx>=0?pickerActiveIdx:0){
  const target=pickerResults[idx];
  if(!target)return;
  if(pickerMode==='commands'){
    const inp=$('cmdk');
    closePagePicker();
    if(inp){
      inp.value=target.value;
      inp.focus({preventScroll:true});
      inp.setSelectionRange(inp.value.length,inp.value.length);
    }
    return;
  }
  if(pickerMode==='trash'){
    closePagePicker();
    restoreTrashedPage(target.id);
    return;
  }
  openNewTab();
  const opened=openTarget(target);
  if(opened)closePagePicker();
}
function handlePagePickerKey(e){
  if(e.key==='Escape'){
    e.preventDefault();
    closePagePicker();
    return;
  }
  if(e.key==='ArrowDown'){
    e.preventDefault();
    if(!pickerResults.length)return;
    pickerActiveIdx=pickerActiveIdx<0?0:Math.min(pickerResults.length-1,pickerActiveIdx+1);
    renderPagePickerList();
    return;
  }
  if(e.key==='ArrowUp'){
    e.preventDefault();
    if(!pickerResults.length)return;
    pickerActiveIdx=pickerActiveIdx<0?pickerResults.length-1:Math.max(0,pickerActiveIdx-1);
    renderPagePickerList();
    return;
  }
  if(e.key==='Enter'){
    e.preventDefault();
    selectPagePicker();
  }
}

function runCommand(raw){
  const inp=$('cmdk');
  const q=(raw||'').trim();
  if(!q)return;
  const directCommand=DIRECT_COMMANDS.find(command=>command.match.test(q));
  if(directCommand){
    directCommand.run();
    if(inp)inp.value='';
    return;
  }
  const target=resolveCommandTarget(q);
  let opened=false;
  if(/^\/?search\s+/i.test(q)){
    const term=q.replace(/^\/?search\s+/i,'').trim();
    if(term){
      updateCurTab({page:'disc',label:'Search',cf,id:null});
      _showRegion('disc');
      doSearch(term);
      opened=true;
    }
  }else{
    opened=openTarget(target);
  }
  if(!inp)return;
  if(opened)inp.value='';
  else focusAndSelectInput(inp);
}

async function dbDeleteEntry(id,label=''){

    if(error){
      if(isMissingTable(error,'articles')){
        markArticlesUnavailable(error,'delete');
        return true;
      }
      console.error('[Studex] dbDeleteEntry failed:',error);
      return false;
    }
    if(!Array.isArray(data)||!data.length){
      console.error('[Studex] article delete was not applied remotely.',id);
      return false;
    }
    if(!HAS_SUPA_CONTENT_LOGS)return true;
    supa.from('content_logs').insert({
      item_id:id,
      item_kind:'page',
      field:'delete',
      old_value:String(label||''),
      new_value:''
      }).then(({error:logErr})=>{
        if(!logErr)return;
        if(isContentLogsUnavailable(logErr))markContentLogsUnavailable(logErr,'delete-log');
        else logNonCriticalIssue('[Studex] content_log failed:',logErr);

  }catch(err){
    console.error('[Studex] dbDeleteEntry failed:',err);
    return false;
  }
}

// ── BLOCK EDITOR ──
const ED={blocks:[],focusIdx:-1,pageId:null,selectAnchor:-1,selectStart:-1,selectEnd:-1,selectAllNative:false};
const ED_EXIT_MARKERS=new Set(['# ','## ','### ','> ','- ','* ','>> ']);
const ED_BLOCK_STYLE_CLASSES=['h1','h2','h3','blockquote','ul-item','ol-item','toggle-item','hr'];

function edInline(s){
  return parseInlineSegments(s).map(segment=>{
    const safe=segment.text
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replaceAll(SOFT_BREAK,'<br>');
    if(segment.type==='bold')return `<strong>${safe}</strong>`;
    if(segment.type==='italic')return `<em>${safe}</em>`;
    if(segment.type==='code')return `<code>${safe}</code>`;
    return safe;
  }).join('');
}
function edNumberMatch(raw=''){
  return raw.match(/^(\d+)\.\s(.*)$/);
}
function edParseBlock(raw=''){
  const numberMatch=edNumberMatch(raw);
  if(/^### /.test(raw))return {cls:'h3',prefix:'### ',body:raw.slice(4),editMarker:''};
  if(/^## /.test(raw))return {cls:'h2',prefix:'## ',body:raw.slice(3),editMarker:''};
  if(/^# /.test(raw))return {cls:'h1',prefix:'# ',body:raw.slice(2),editMarker:''};
  if(/^> /.test(raw))return {cls:'blockquote',prefix:'> ',body:raw.slice(2),editMarker:''};
  if(/^>> /.test(raw))return {cls:'toggle-item',prefix:'>> ',body:raw.slice(3),editMarker:'▸'};
  if(/^---$/.test(raw))return {cls:'hr',prefix:'',body:raw,editMarker:''};
  if(numberMatch)return {cls:'ol-item',prefix:`${numberMatch[1]}. `,body:numberMatch[2],editMarker:`${numberMatch[1]}.`};
  if(/^\* /.test(raw))return {cls:'ul-item',prefix:'* ',body:raw.slice(2),editMarker:'•'};
  if(/^- /.test(raw))return {cls:'ul-item',prefix:'- ',body:raw.slice(2),editMarker:'•'};
  return {cls:'',prefix:'',body:raw,editMarker:''};
}
function edBlockClass(raw){
  return edParseBlock(raw).cls;
}
function edBlockHTML(raw){
  const parsed=edParseBlock(raw);
  if(!raw.trim())return '&nbsp;';
  if(parsed.cls==='h3'||parsed.cls==='h2'||parsed.cls==='h1'||parsed.cls==='blockquote')return edInline(parsed.body);
  if(/^---$/.test(raw))return '';
  if(parsed.cls==='toggle-item'||parsed.cls==='ol-item'||parsed.cls==='ul-item'){
    return `<span class="ed-marker">${parsed.editMarker}</span><span class="ed-text">${edInline(parsed.body)}</span>`;
  }
  return edInline(raw);
}
function edRenderPlaceholder(container){
  if(!container)return;
  container.innerHTML='';
  appendMessage(container,PAGE_PLACEHOLDER_TEXT,'ed-placeholder');
}
function edHasBlockSelection(){
  return ED.selectStart>=0&&ED.selectEnd>=ED.selectStart;
}
function edClearBlockSelection(resetAnchor=false){
  ED.selectStart=-1;
  ED.selectEnd=-1;
  if(resetAnchor)ED.selectAnchor=-1;
}
function edClearNativeSelectionFlag(){

}
function edIsBlockSelected(i){
  return edHasBlockSelection()&&i>=ED.selectStart&&i<=ED.selectEnd;
}
function edSetBlockSelection(anchor,target){
  const nextAnchor=anchor>=0?anchor:target;
  ED.selectAnchor=nextAnchor;
  ED.selectStart=Math.min(nextAnchor,target);
  ED.selectEnd=Math.max(nextAnchor,target);
  ED.focusIdx=-1;
  edRebuild();
}
function edSelectSingleBlock(i){

}
function edSelectedBlocks(){
  return edHasBlockSelection()?ED.blocks.slice(ED.selectStart,ED.selectEnd+1):[];
}
function edHasNativeTextSelection(){
  const sel=window.getSelection();

}
function edCanStartNativeSelectAll(){
  if(!activePageId||hasBlockingOverlay())return false;

  const active=document.activeElement;

function edAdvanceSelectAll(){

function edSelectAllBlocks(){

function edFocusAtEnd(node){

function edFocusAtStart(node){

function edCaretOffset(node){

function edSyncEditingPlaceholder(node){

function edApplyEditingState(node,raw=''){

function edShortcutPrefix(text=''){

  if(numberMatch)return `${numberMatch[1]}. `;

}
function edContinuationText(raw=''){

function edIsEffectivelyEmpty(){

}
function edIsExitMarker(raw=''){

}
function edDeleteSelectedBlocks(){
  if(!edHasBlockSelection())return false;
  const deletedAll=ED.selectStart===0&&ED.selectEnd===ED.blocks.length-1;
  const nextIndex=Math.min(ED.selectStart,Math.max(0,ED.blocks.length-1));
  ED.blocks.splice(ED.selectStart,ED.selectEnd-ED.selectStart+1);
  if(!ED.blocks.length)ED.blocks=[''];
  edClearBlockSelection(true);

  if(deletedAll&&ED.pageId)flushQueuedSave(ED.pageId);
  edRebuild();
  if(deletedAll&&ED.blocks.length===1&&!ED.blocks[0])return true;

}
function edDeleteAllBlocks(){

  edClearBlockSelection(true);
  edClearNativeSelectionFlag();
  ED.focusIdx=-1;
  edSave();

}
function edRebuild(){

  container.innerHTML='';
  if(!ED.blocks.length)ED.blocks=[''];
  if(ED.blocks.length===1&&!ED.blocks[0]&&ED.focusIdx<0){edRenderPlaceholder(container);return;}
  ED.blocks.forEach((_,i)=>container.appendChild(edMakeBlock(i)));

function edMakeBlock(i){

function edFocus(i,at='end'){

function edBlockKey(e,div,i){
  if(e.isComposing)return;
  if(!div)return;
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='a'){
    e.preventDefault();
    e.stopPropagation();
    edAdvanceSelectAll();
    return;
  }
  if(ED.selectAllNative&&(e.key==='Backspace'||e.key==='Delete')){
    e.preventDefault();
    edDeleteAllBlocks();
    return;
  }
  if(!(ED.selectAllNative&&(e.key==='Backspace'||e.key==='Delete')))edClearNativeSelectionFlag();
  const raw=edReadBlockRaw(div);
  if(e.shiftKey&&(e.key==='ArrowUp'||e.key==='ArrowDown')){
    e.preventDefault();
    const target=e.key==='ArrowUp'?Math.max(0,i-1):Math.min(ED.blocks.length-1,i+1);
    edSetBlockSelection(ED.selectAnchor>=0?ED.selectAnchor:i,target);
    return;
  }
  if(e.key===' '){
    const offset=edCaretOffset(div);
    const text=div.textContent||'';
    const nextPrefix=!div.dataset.mdPrefix&&offset===text.length?edShortcutPrefix(text):'';
    if(nextPrefix){
      e.preventDefault();
      div.dataset.mdPrefix=nextPrefix;
      div.textContent='';
      edApplyEditingState(div,nextPrefix);
      edSyncEditingPlaceholder(div);
      ED.blocks[i]=nextPrefix;
      edSave();
      return;
    }
  }
  if(e.key==='Enter'){
    e.preventDefault();
    if(e.shiftKey){
      insertSoftBreakAtSelection();
      edApplyEditingState(div,edReadBlockRaw(div));
      edSyncEditingPlaceholder(div);
      ED.blocks[i]=edReadBlockRaw(div);
      edSave();
      return;
    }
    if(edIsExitMarker(raw)){
      ED.blocks[i]='';
      ED.focusIdx=-1;
      edRebuild();
      edFocus(i);
      return;
    }
    ED.blocks[i]=raw;
    ED.blocks.splice(i+1,0,edContinuationText(raw));
    ED.focusIdx=-1;edRebuild();edFocus(i+1);
  }else if(e.key==='Backspace'&&div.textContent===''&&ED.blocks.length>1){
    e.preventDefault();ED.blocks.splice(i,1);edRebuild();edFocus(Math.max(0,i-1));
  }else if(e.key==='ArrowLeft'&&i>0){
    const offset=edCaretOffset(div);
    if(offset===0){
      e.preventDefault();
      edFocus(i-1,'end');
    }
  }else if(e.key==='ArrowRight'&&i<ED.blocks.length-1){
    const offset=edCaretOffset(div);
    if(offset===raw.length){
      e.preventDefault();
      edFocus(i+1,'start');
    }
  }else if(e.key==='ArrowUp'&&i>0){
    const offset=edCaretOffset(div);
    if(offset===0){
      e.preventDefault();
      edFocus(i-1);
    }
  }else if(e.key==='ArrowDown'&&i<ED.blocks.length-1){
    const offset=edCaretOffset(div);
    if(offset===raw.length){
      e.preventDefault();
      edFocus(i+1);
    }
  }
}
function edBlockBlur(i){
  const container=$('ed-container');if(!container)return;
  const div=container.querySelector(`[data-idx="${i}"]`);
  if(div&&div.contentEditable==='true')ED.blocks[i]=edReadBlockRaw(div);
  edSave();
  requestAnimationFrame(()=>{
    if(ED.focusIdx!==i)return;
    ED.focusIdx=-1;
    const cur=container.querySelector(`[data-idx="${i}"]`);
    if(cur)cur.replaceWith(edMakeBlock(i));
    if(ED.blocks.every(b=>!b.trim()))edRenderPlaceholder(container);
  });
}
function edBlockPaste(e,i){
  e.preventDefault();
  const text=readPlainClipboardText(e);
  const lines=normalizeBodyPasteLines(text);
  const container=$('ed-container');
  const div=container.querySelector(`[data-idx="${i}"]`);
  const sel=window.getSelection();
  if(sel&&sel.rangeCount){
    const range=sel.getRangeAt(0);range.deleteContents();
    range.insertNode(document.createTextNode(lines[0]));range.collapse(false);
    sel.removeAllRanges();sel.addRange(range);
  }
  if(div)edApplyEditingState(div,edReadBlockRaw(div));
  ED.blocks[i]=div?edReadBlockRaw(div):'';
  if(lines.length>1){
    ED.blocks.splice(i+1,0,...lines.slice(1));
    ED.focusIdx=i+lines.length-1;edRebuild();edFocus(ED.focusIdx);
  }
  edSave();
}

function mkField(id,key,val,cls){
  const v=el('div','cm-v '+cls);v.spellcheck=false;
  if(cls.includes('v-def')){
    // v-def는 별도 ed-container로 처리 — 여기선 wrapper만
    v.contentEditable='false';
    v.style.pointerEvents='none';v.style.display='none';
    return v;
  }
  v.contentEditable='true';
  v.dataset.fieldId=id;
  v.dataset.fieldKey=key;
  renderInlineField(v,val||'');
  v.addEventListener('focus',()=>beginInlineFieldEdit(v));
  v.addEventListener('input',()=>{
    maybeApplyInlineWrapShortcut(v);
    setInlineDirty(id,readEditableText(v)!==(v.dataset.raw||''));
  });
  v.addEventListener('keydown',e=>handleFieldKeydown(e,id,key,v));
  v.addEventListener('paste',handlePlainTextPaste);
  v.addEventListener('blur',()=>endInlineFieldEdit(v,id,key));
  return v;

function saveField(id,key,raw){
  const c=DB[id];if(!c)return;
  const prevSnap=snapEntry(id);
  const prevValue=key==='title'?c.label:key==='def'?c.def:aliasLabel(c);
  if(key==='title'){
    c.label=raw;
    applyStructuredRename(id,prevValue,raw);
  }
  else if(key==='def')c.def=raw;
  else if(key==='sub'){const parsed=parsePageSubField(raw);c.orig=parsed.orig;c.alias=parsed.alias;}
  if(key==='title'&&(c.level==='Discipline'||c.level==='Sub-discipline'||c.level==='Writing Category'||c.level==='Section'))renderSidebarLists();
  if(key==='title'){
    renderTabbar();
    renderMultiView();
  }
  else if(activePageId===id)renderRightInfo();
  if(prevSnap!==snapEntry(id)){
    refreshDirty(id);
    queueAutoSave(id,{field:key,oldVal:prevValue,newVal:key==='sub'?aliasLabel(c):raw});
  }
  if(curTab().page!=='page')renderMainDiscContent();
}

function handleNativeSelectAllKeydown(e){

    return true;

// Stored row -> DB entry
function _rowToEntry(r){
  return {label:r.label,cat:r.cat,level:r.level,orig:r.orig||'',alias:r.alias||'',def:r.def||'',parent:r.parent||null,children:r.children||[]};
}

// DB entry -> stored row
function _entryToRow(id,c){
  return {id,label:c.label,cat:c.cat,level:c.level,orig:c.orig||'',alias:c.alias||'',def:c.def||'',parent:c.parent||null,children:c.children||[],updated_at:new Date().toISOString()};
}
function mergeSeedAndRemoteEntries(remoteRows=[]){
  const remoteMap=Object.fromEntries(remoteRows.map(r=>[r.id,_rowToEntry(r)]));
  replaceObjectContents(DB,JSON.parse(JSON.stringify(SEED_DB)));
  Object.entries(remoteMap).forEach(([id,entry])=>{DB[id]=entry;});
  return Object.keys(SEED_DB).filter(id=>!(id in remoteMap));
}
function syncArticleRows(rows,source=''){
  if(!HAS_SUPA_ARTICLES||!rows.length)return;
  supa.from('articles').upsert(rows).then(({error})=>{
    if(!error)return;
    if(isMissingTable(error,'articles'))markArticlesUnavailable(error,source);
    else logNonCriticalIssue(`[Studex] ${source} failed:`,error.message||error);
  });
}

function normalizeDB(){
  const fixes=['writings','diaries','journals','essays','manuscripts','creative'];
  if(DB.writings){
    DB.writings.level='Section';
    DB.writings.cat='writings';
    DB.writings.children=[];
  }
  WRITING_IDS.forEach(id=>{
    if(!DB[id])return;
    DB[id].level='Writing Category';
    DB[id].cat=DB[id].label;
    delete DB[id].parent;
  });
  return fixes.filter(id=>DB[id]);
}
function finalizeLoadedDB(){
  const removedIds=pruneTestArtifactsFromMap(DB);
  removedIds.forEach(id=>{
    const idx=recentIds.indexOf(id);
    if(idx>=0)recentIds.splice(idx,1);
  });
  const normalizedIds=normalizeDB();
  ensureParentChildLinks();
  rebuildDiscMapFromDB();
  persistCacheState();
  Object.keys(DB).forEach(captureSavedState);
  return normalizedIds;
}

async function dbLoad(){
  const cacheState=readCacheState();
  let idsToSync=[];
  if(!HAS_SUPA_ARTICLES){
    hydrateCachedState();
    finalizeLoadedDB();
    return;
  }
  try{
    const {data:arts,error:artErr}=await supa.from('articles').select('*');
    if(artErr){
      if(isMissingTable(artErr,'articles'))markArticlesUnavailable(artErr,'load');
      else console.error('[Studex] articles load error:',artErr.message,artErr.code);
    }
    if(!HAS_SUPA_ARTICLES)hydrateCachedState();
    else if(!artErr&&arts&&arts.length){
      const missingSeedIds=mergeSeedAndRemoteEntries(arts);
      idsToSync.push(...missingSeedIds);
    } else if(HAS_SUPA_ARTICLES) {
      // Supabase에 데이터 없으면 하드코딩 DB를 Supabase에 초기 저장
      idsToSync.push(...Object.keys(DB));
    }
    idsToSync.push(...mergeCachedDirtyEntries(cacheState));
    const normalizedIds=finalizeLoadedDB();
    idsToSync.push(...normalizedIds);
    if(HAS_SUPA_ARTICLES){
      const syncIds=[...new Set(idsToSync)].filter(id=>DB[id]);
      if(syncIds.length)syncArticleRows(syncIds.map(id=>_entryToRow(id,DB[id])),'load sync');
    }
  }catch(err){
    console.error('[Studex] dbLoad failed:',err?.message||err);
  }
}

      if(!HAS_SUPA_CONTENT_LOGS)return;
      supa.from('content_logs').insert({
        item_id:id,
        item_kind:'page',
        field:changedField,
        old_value:String(oldVal??''),
        new_value:String(newVal??'')
      }).then(({error:logErr})=>{
        if(!logErr)return;
        if(isContentLogsUnavailable(logErr))markContentLogsUnavailable(logErr,'insert');
        else logNonCriticalIssue('[Studex] content_log failed:',logErr);
      });
    }
  }catch(err){
    if(isTransientSaveAbort(err))logNonCriticalIssue('[Studex] dbSaveEntry aborted during page hide.',err);
    else console.error('[Studex] dbSaveEntry failed:',err);
  }
}
async function retrySupabaseSync(){
  resetSupabaseAvailability();
  await dbLoad();
  syncAfterDataMutation({reapplyCurrentTab:true,persistCache:false,syncToggles:true});
  showNotice('Supabase retried',1200);
}

function flushPendingSaves(){
  commitActiveInlineField(activePageId||'');
  Object.keys(SAVE_TIMERS).forEach(id=>{
    clearTimeout(SAVE_TIMERS[id]);
    delete SAVE_TIMERS[id];
    flushSaveEntry(id);
  });
}

applyTheme(!!SYSTEM_THEME_QUERY?.matches);
if(SYSTEM_THEME_QUERY){
  if(typeof SYSTEM_THEME_QUERY.addEventListener==='function')SYSTEM_THEME_QUERY.addEventListener('change',syncSystemTheme);
  else if(typeof SYSTEM_THEME_QUERY.addListener==='function')SYSTEM_THEME_QUERY.addListener(syncSystemTheme);
}
window.addEventListener('resize',()=>{
  syncPagePickerPosition();
  syncPanelLayoutTransition();
});
window.addEventListener('pagehide',()=>{
  const pendingDirtyIds=dirtyPageIds();
  flushPendingSaves();
  persistCacheState();
  keepaliveSyncArticleRows(pendingDirtyIds);
});
window.addEventListener('popstate',e=>{
  if(restoreBrowserState(e.state))return;
});
dbLoad().then(async()=>{
  syncAfterDataMutation({persistCache:false,syncToggles:true});
  _applyTab(curTab());
  writeBrowserState('replace');
  await maybeRestoreSupabaseAvailability();
});
</script>
</body></html>
